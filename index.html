<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calcul numeric</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body id="body">
    <div id="principal_div">
        <h1>Calcul numeric</h1>
        <p id="correct_answers_p" class="answers_p">Răspunsuri corecte: <b><span id="correct_answers">0</span></b></p>
        <p id="wrong_answers_p" class="answers_p">Răspunsuri greșite: <b><span id="wrong_answers">0</span></b></p>
        <form id="configuration_form">
            <label for="min_value_operand" class="answers_p">Numar exercitii:</label>
            <input type="range" min="10" max="100" value="20" id="min_value_operand" name="min_value_operand" oninput="value_operand_range_input()">
            <label for="min_value_operand" class="answers_p" id="min_value_operand_label_1">20</label><br><br>
            <label for="max_value_operand" class="answers_p">Valoare maximă a operandului:</label>
            <input type="range" min="0" max="100" value="30" id="max_value_operand" name="max_value_operand" oninput="value_operand_range_input()">
            <label for="max_value_operand" class="answers_p" id="max_value_operand_label_1">30</label><br><br>
            <label for="answer_timeout_milliseconds" class="answers_p">Timp limită pentru a răspunde:</label>
            <input type="range" min="1" max="600" value="120" id="answer_timeout_milliseconds" name="answer_timeout_milliseconds" oninput="answer_timeout_milliseconds_range_input()">
            <label for="answer_timeout_milliseconds" class="answers_p" id="answer_timeout_milliseconds_label">120 s</label><br><br>
            <p id="dificulty_levels_p" class="answers_p">Nivele de dificultate</p>
            <input type="radio" id="level_1_problems" name="level_1_problems" value="1" checked="checked">
            <label for="level_1_problems" class="answers_p"> Nivel 1</label><br><br>
        </form>
        <div id="expression_div">
            <p id="expression" class="expression_p"></p>
        </div>
        <button id="start_button" type="button" class="button" onclick="start()"><b>Start</b></button>
    </div>
    <script src="script.js"></script>
</body>
</html>
